<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <script>try{if(localStorage.getItem('theme')==='light')document.documentElement.classList.add('light')}catch(e){}</script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TradersLab</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='80' font-size='80'>📊</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,300;0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;1,14..32,400&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'],
          },
          colors: {
            surface: {
              DEFAULT: '#0d1117',
              1: '#161b22',
              2: '#1c2333',
              3: '#21262d',
            },
          },
        },
      },
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.2.0"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/dark.css">
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/fr.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/vis-network@9.1.9/standalone/umd/vis-network.min.js"></script>
  <link rel="stylesheet" href="/static/style.css">
  <script src="/static/evaluation/evaluation.bundle.js"></script>
</head>
<body class="bg-[#0d1117] text-slate-300 min-h-screen">

  <!-- NAV -->
  <nav class="nav-glass border-b border-white/[0.06] sticky top-0 z-40">
    <div class="px-5 flex items-center justify-between h-[52px]">
      <div class="flex items-center gap-3">
        <a href="#/" class="flex items-center gap-2 text-[15px] font-semibold text-white tracking-tight hover:opacity-80 transition">
          <span class="text-base">📊</span> TradersLab
        </a>
        <button id="btn-toggle-sidebar" class="btn-ghost text-slate-500 hover:text-slate-300" title="Toggle sidebar">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect y="2" width="16" height="1.5" rx=".75" fill="currentColor"/><rect y="7.25" width="16" height="1.5" rx=".75" fill="currentColor"/><rect y="12.5" width="16" height="1.5" rx=".75" fill="currentColor"/></svg>
        </button>
      </div>
      <div class="flex items-center gap-1">
        <a href="#/" class="nav-link">Dashboard</a>
        <a href="#/compare" class="nav-link">Comparer</a>
        <div class="flex items-center gap-1 ml-2 pl-3 border-l border-white/[0.08]">
          <select id="unit-selector" class="select-ghost text-xs" title="Unité d'affichage">
            <option value="cash">$ Cash</option>
            <option value="pct">%</option>
            <option value="R">R</option>
          </select>
          <span id="unit-info" class="hidden text-slate-500 text-xs cursor-help">&#9432;</span>
          <button id="btn-unit-settings" class="btn-ghost text-slate-500 hover:text-slate-300" title="Paramètres unités">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 9a2 2 0 1 0 0-4 2 2 0 0 0 0 4Z" stroke="currentColor" stroke-width="1.4"/><path d="M7 1v1.5M7 11.5V13M1 7h1.5M11.5 7H13M2.636 2.636l1.06 1.06M10.304 10.304l1.06 1.06M11.364 2.636l-1.06 1.06M3.696 10.304l-1.06 1.06" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
          </button>
          <button id="btn-theme-toggle" class="btn-ghost text-slate-500 hover:text-slate-300" title="Passer en mode clair">
            <svg id="icon-sun" width="15" height="15" viewBox="0 0 15 15" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="7.5" cy="7.5" r="2.5" stroke="currentColor" stroke-width="1.4"/><path d="M7.5 1v1.5M7.5 12.5V14M1 7.5h1.5M12.5 7.5H14M2.697 2.697l1.06 1.06M11.243 11.243l1.06 1.06M12.303 2.697l-1.06 1.06M3.757 11.243l-1.06 1.06" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
            <svg id="icon-moon" width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg" class="hidden"><path d="M12.5 9A5.5 5.5 0 0 1 5 1.5a5.5 5.5 0 1 0 7.5 7.5Z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/></svg>
          </button>
        </div>
      </div>
    </div>
  </nav>

  <!-- LAYOUT: SIDEBAR + MAIN -->
  <div class="flex" style="height: calc(100vh - 52px);">

    <!-- SIDEBAR -->
    <aside id="sidebar" class="sidebar bg-[#161b22] flex-shrink-0 overflow-y-auto">
      <div class="p-3">
        <div class="flex items-center justify-between mb-3">
          <span class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Stratégies</span>
          <button id="btn-new-strat-sidebar" class="text-xs text-blue-400 hover:text-blue-300 transition" title="Nouvelle stratégie">+ Ajouter</button>
        </div>
        <div id="sidebar-tree" class="space-y-1">
          <div class="text-xs text-slate-500 italic py-4 text-center">Chargement...</div>
        </div>
      </div>
    </aside>
    <div id="sidebar-resize-handle" class="sidebar-resize-handle"></div>

    <!-- APP -->
    <main id="app" class="flex-1 overflow-y-auto px-6 py-6">
      <div class="flex items-center justify-center h-64">
        <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-500"></div>
      </div>
    </main>

  </div>

  <!-- MODAL -->
  <div id="modal-overlay" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 hidden items-center justify-center">
    <div id="modal-content" class="bg-slate-800 border border-slate-700 rounded-xl shadow-2xl p-6 w-full max-w-lg mx-4 max-h-[90vh] overflow-y-auto"></div>
  </div>

  <script src="/static/api.js"></script>
  <script src="/static/app.js"></script>
</body>
</html>
