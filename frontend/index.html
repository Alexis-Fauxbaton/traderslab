<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TradersLab</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='80' font-size='80'>📊</text></svg>">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body class="bg-slate-900 text-slate-200 min-h-screen">

  <!-- NAV -->
  <nav class="bg-slate-800 border-b border-slate-700 sticky top-0 z-40">
    <div class="px-4 flex items-center justify-between h-14">
      <div class="flex items-center gap-4">
        <a href="#/" class="flex items-center gap-2 text-lg font-bold text-white hover:text-blue-400 transition">
          📊 TradersLab
        </a>
        <button id="btn-toggle-sidebar" class="text-slate-400 hover:text-white transition text-sm px-2 py-1 rounded border border-slate-600 hover:border-slate-500" title="Toggle sidebar">☰</button>
      </div>
      <div class="flex items-center gap-4">
        <a href="#/" class="text-sm text-slate-300 hover:text-white transition">Dashboard</a>
        <a href="#/compare" class="text-sm text-slate-300 hover:text-white transition">Comparer</a>
      </div>
    </div>
  </nav>

  <!-- LAYOUT: SIDEBAR + MAIN -->
  <div class="flex" style="height: calc(100vh - 56px);">

    <!-- SIDEBAR -->
    <aside id="sidebar" class="sidebar bg-slate-800 border-r border-slate-700 flex-shrink-0 overflow-y-auto">
      <div class="p-3">
        <div class="flex items-center justify-between mb-3">
          <span class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Stratégies</span>
          <button id="btn-new-strat-sidebar" class="text-xs text-blue-400 hover:text-blue-300 transition" title="Nouvelle stratégie">+ Ajouter</button>
        </div>
        <div id="sidebar-tree" class="space-y-1">
          <div class="text-xs text-slate-500 italic py-4 text-center">Chargement...</div>
        </div>
      </div>
    </aside>

    <!-- APP -->
    <main id="app" class="flex-1 overflow-y-auto px-6 py-6">
      <div class="flex items-center justify-center h-64">
        <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-500"></div>
      </div>
    </main>

  </div>

  <!-- MODAL -->
  <div id="modal-overlay" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 hidden items-center justify-center">
    <div id="modal-content" class="bg-slate-800 border border-slate-700 rounded-xl shadow-2xl p-6 w-full max-w-lg mx-4"></div>
  </div>

  <script src="/static/api.js"></script>
  <script src="/static/app.js"></script>
</body>
</html>
